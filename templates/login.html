<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 鸟类识别系统</title>
    <link rel="stylesheet" href="/static/css/sty.css">
    <style>
        :root {
            --navy: #172a45;
            --deep-blue: #0a192f;
            --accent: #64ffda;
            --text-primary: #ccd6f6;
            --text-secondary: #8892b0;
        }
        
        body {
            background: var(--deep-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .login-container {
            background: var(--navy);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 255, 218, 0.2);
        }
        
        .login-title {
            color: var(--accent);
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #64ffda, #00bfa5);
            border: none;
            border-radius: 8px;
            color: #0a192f;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(100, 255, 218, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }
        
        .login-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .error-msg {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6b6b;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">🦅 登录</h1>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>
        
        <div class="login-footer">
            还没有账号？<a href="/user/register">立即注册</a>
        </div>
        
        <a href="/index" class="back-link">← 返回首页</a>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('user_info', JSON.stringify(data.data.user));
                    window.location.href = '/index';
                } else {
                    errorMsg.textContent = data.detail || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            }
            
            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        });
    </script>
</body>
</html>
