<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 鸟类识别系统</title>
    <link rel="stylesheet" href="/static/css/sty.css">
    <style>
        :root {
            --navy: #172a45;
            --deep-blue: #0a192f;
            --accent: #64ffda;
            --text-primary: #ccd6f6;
            --text-secondary: #8892b0;
        }
        
        body {
            background: var(--deep-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .register-container {
            background: var(--navy);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 255, 218, 0.2);
        }
        
        .register-title {
            color: var(--accent);
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #64ffda, #00bfa5);
            border: none;
            border-radius: 8px;
            color: #0a192f;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(100, 255, 218, 0.4);
        }
        
        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .register-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }
        
        .register-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
        }
        
        .error-msg {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6b6b;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-msg {
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: var(--accent);
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1 class="register-title">🦅 注册</h1>
        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名 *</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label for="password">密码 *</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码 *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入密码">
            </div>
            
            <div class="form-group">
                <label for="email">邮箱（可选）</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱">
            </div>
            
            <div class="form-group">
                <label for="nickname">昵称（可选）</label>
                <input type="text" id="nickname" name="nickname" placeholder="请输入昵称">
            </div>
            
            <button type="submit" class="register-btn" id="registerBtn">注册</button>
        </form>
        
        <div class="register-footer">
            已有账号？<a href="/user/login">立即登录</a>
        </div>
        
        <a href="/index" class="back-link">← 返回首页</a>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            const nickname = document.getElementById('nickname').value;
            const registerBtn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            try {
                const response = await fetch('/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username, 
                        password,
                        email: email || null,
                        nickname: nickname || null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMsg.textContent = '注册成功！即将跳转到登录页面...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/user/login';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.detail || '注册失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            }
            
            registerBtn.disabled = false;
            registerBtn.textContent = '注册';
        });
    </script>
</body>
</html>
